<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Recursos - Bytecomtec Ingeniería</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --azul-byte: #01579b;
            --dorado-byte: #d4a017;
            --gris-fondo: #f4f7f6;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-fondo);
            margin: 0;
            color: #333;
        }

        /* Encabezado con Logo */
        header {
            background-color: var(--azul-byte);
            color: var(--blanco);
            padding: 1.5rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            max-width: 180px; /* Ajusta el tamaño según tu logo */
            height: auto;
            filter: brightness(0) invert(1); /* Opcional: vuelve el logo blanco si es oscuro */
        }

        .brand-name { 
            font-weight: bold; 
            font-size: 1.6rem; 
            letter-spacing: 1px;
            margin: 0;
        }

        .tagline {
            font-size: 0.9rem;
            opacity: 0.9;
            margin: 5px 0 0 0;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h2 {
            border-left: 5px solid var(--dorado-byte);
            padding-left: 15px;
            color: var(--azul-byte);
            margin-bottom: 1.5rem;
        }

        /* Grid de Videos */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 4rem;
        }

        .card {
            background: var(--blanco);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-8px); }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
        }
